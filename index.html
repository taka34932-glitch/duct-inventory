<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ダクト在庫管理</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans',sans-serif;background:#f1f5f9;min-height:100vh}
#header{background:#1e293b;color:#fff;padding:0 16px;height:54px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
#header span.title{font-weight:800;font-size:16px}
#main{max-width:900px;margin:0 auto;padding:16px}
.card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08);border:2px solid #e2e8f0;margin-bottom:14px}
.card.alert{border-color:#fca5a5}
.card-head{padding:10px 14px;display:flex;justify-content:space-between;align-items:center;background:#f8fafc;border-bottom:1px solid #e2e8f0}
.card-head.alert{background:#fef2f2}
.card-head .phi{font-weight:800;font-size:16px;color:#1e293b}
.card-head .warn{font-size:12px;color:#dc2626;font-weight:700}
.sec-head{padding:6px 14px;font-weight:800;font-size:12px;letter-spacing:.04em}
.row{padding:8px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #f1f5f9;flex-wrap:wrap}
.row.zero{background:#fff8f8}
.row .name{flex:1 1 140px;font-size:13px;color:#374151;min-width:0}
.row .qty{font-weight:800;font-size:15px;white-space:nowrap}
.row .qty.zero{color:#dc2626}
.badge{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;background:#fee2e2;color:#dc2626;border:1px solid #fca5a5;white-space:nowrap}
.btn{padding:3px 10px;border:1.5px solid #e2e8f0;border-radius:5px;background:#fff;font-size:11px;cursor:pointer;font-weight:700;color:#475569;margin-left:auto}
.btn.del{border-color:#fecaca;background:#fef2f2;color:#dc2626;margin-left:4px}
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.sum-card{background:#fff;border-radius:10px;padding:12px 14px;box-shadow:0 1px 3px rgba(0,0,0,.07);display:flex;align-items:center;gap:10px}
.sum-card .icon{font-size:22px}
.sum-card .label{font-size:10px;color:#94a3b8;font-weight:600}
.sum-card .val{font-size:18px;font-weight:800;color:#1e293b}
.sum-card .val.warn{color:#dc2626}
.tabs{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap}
.tab{padding:7px 14px;border:none;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;background:#334155;color:#94a3b8}
.tab.active{background:#3b82f6;color:#fff}
.filters{background:#fff;border-radius:10px;padding:12px 16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.07);display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end}
.filters label{font-size:11px;font-weight:700;color:#64748b;display:block;margin-bottom:4px}
.filters select,.filters input[type=checkbox]{border:1.5px solid #e2e8f0;border-radius:7px;padding:7px 10px;font-size:13px;color:#1e293b;background:#f8fafc}
.add-btns{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
.add-btn{padding:7px 14px;border:none;border-radius:7px;color:#fff;font-weight:700;font-size:12px;cursor:pointer}
.phi-chips{display:flex;flex-wrap:wrap;gap:4px;width:100%;margin-top:4px}
.chip{padding:3px 10px;border-radius:14px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid #e2e8f0;background:#f1f5f9;color:#94a3b8}
.chip.warn{background:#fee2e2;color:#dc2626;border-color:#fca5a5}
.chip.active{background:#1e293b;color:#fff;border-color:#1e293b}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07)}
th{padding:11px 12px;text-align:left;font-size:11px;font-weight:700;white-space:nowrap}
td{padding:10px 12px;font-size:13px;border-bottom:1px solid #f1f5f9}
tr:last-child td{border-bottom:none}
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.5);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:#fff;border-radius:14px;padding:24px;width:min(92vw,420px);box-shadow:0 20px 60px rgba(0,0,0,.2);max-height:90vh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:800;color:#1e293b;margin-bottom:18px}
.modal label{display:block;font-size:11px;font-weight:700;color:#64748b;margin-bottom:5px;margin-top:12px}
.modal input,.modal select{width:100%;padding:8px 10px;border:1.5px solid #e2e8f0;border-radius:7px;font-size:13px;color:#1e293b;background:#f8fafc}
.modal .preview{font-size:12px;color:#64748b;margin-top:8px}
.modal .preview strong{color:#1e293b}
.modal .row-btn{display:flex;gap:10px;margin-top:16px;justify-content:flex-end}
.modal .cancel{padding:8px 18px;border:1.5px solid #e2e8f0;border-radius:7px;background:#fff;color:#64748b;font-weight:600;cursor:pointer;font-size:13px}
.modal .save{padding:8px 22px;border:none;border-radius:7px;background:#3b82f6;color:#fff;font-weight:700;cursor:pointer;font-size:13px}
.adj-row{display:flex;gap:10px;margin-top:12px}
.adj-in{padding:12px;border:1.5px solid #e2e8f0;border-radius:7px;font-size:20px;font-weight:700;text-align:center;width:100%;background:#f8fafc}
.btn-in{flex:1;padding:13px;border:none;border-radius:8px;color:#fff;font-weight:800;font-size:15px;cursor:pointer}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
</style>
</head>
<body>
<div id="pw-screen" style="position:fixed;inset:0;background:#1e293b;display:flex;align-items:center;justify-content:center;z-index:999">
  <div style="background:#fff;border-radius:16px;padding:32px;width:min(90vw,360px);text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.4)">
    <div style="font-size:40px;margin-bottom:12px">🌀</div>
    <div style="font-size:18px;font-weight:800;color:#1e293b;margin-bottom:6px">ダクト在庫管理</div>
    <div style="font-size:13px;color:#64748b;margin-bottom:20px">パスワードを入力してください</div>
    <input id="pw-input" type="password" placeholder="パスワード"
      style="width:100%;padding:12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:16px;text-align:center;margin-bottom:10px;outline:none"
      onkeydown="if(event.key==='Enter')checkPw()">
    <div id="pw-error" style="color:#dc2626;font-size:12px;margin-bottom:8px;min-height:16px"></div>
    <button onclick="checkPw()"
      style="width:100%;padding:12px;background:#3b82f6;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer">
      ログイン
    </button>
  </div>
</div>
<script>
const PASSWORD = "meisei0420";
function checkPw(){
  const v = document.getElementById("pw-input").value;
  if(v === PASSWORD){
    document.getElementById("pw-screen").style.display = "none";
  } else {
    document.getElementById("pw-error").textContent = "パスワードが違います";
    document.getElementById("pw-input").value = "";
    document.getElementById("pw-input").focus();
  }
}
</script>
<div id="header"><span style="font-size:20px">🌀</span><span class="title">ダクト在庫管理</span></div>
<div id="main">
  <div id="app"><p style="text-align:center;padding:40px;color:#64748b">読み込み中...</p></div>
</div>

<script>
// Firebase設定
firebase.initializeApp({
  apiKey:"AIzaSyDdYBHxjK78-i9uswYJrrR1ZcGkyFkZoDE",
  authDomain:"duct-inventory.firebaseapp.com",
  databaseURL:"https://duct-inventory-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"duct-inventory",
  storageBucket:"duct-inventory.firebasestorage.app",
  messagingSenderId:"635885946227",
  appId:"1:635885946227:web:ad16a6461da6696bee7106"
});
const db = firebase.database();

// 定数
const PHI = [100,125,150,175,200,225,250,275,300,325,350];
const MATS = [{k:"z",l:"亜鉛"},{k:"ss",l:"ステン"},{k:"g",l:"ガルバ"}];
const CATS = {
  spiral:{label:"スパイラル管",icon:"🔵",color:"#2563eb",bg:"#eff6ff",border:"#bfdbfe",
    items:[{k:"spiral_z",n:"スパイラル管（亜鉛）",u:"本"},{k:"spiral_ss",n:"スパイラル管（ステン）",u:"本"},{k:"spiral_g",n:"スパイラル管（ガルバ）",u:"本"}]},
  elbow45:{label:"エルボ 45°",icon:"🟠",color:"#ea580c",bg:"#fff7ed",border:"#fed7aa",
    items:[{k:"elbow45_z",n:"エルボ 45°（亜鉛）",u:"個"},{k:"elbow45_ss",n:"エルボ 45°（ステン）",u:"個"},{k:"elbow45_g",n:"エルボ 45°（ガルバ）",u:"個"}]},
  elbow90:{label:"エルボ 90°",icon:"🟡",color:"#b45309",bg:"#fffbeb",border:"#fde68a",
    items:[{k:"elbow90_z",n:"エルボ 90°（亜鉛）",u:"個"},{k:"elbow90_ss",n:"エルボ 90°（ステン）",u:"個"},{k:"elbow90_g",n:"エルボ 90°（ガルバ）",u:"個"}]},
  nipple:{label:"ニップル",icon:"⚪",color:"#475569",bg:"#f8fafc",border:"#e2e8f0",
    items:[{k:"nipple_z",n:"ニップル（亜鉛）",u:"個"},{k:"nipple_ss",n:"ニップル（ステン）",u:"個"},{k:"nipple_g",n:"ニップル（ガルバ）",u:"個"}]},
  flexi:{label:"フレキ類",icon:"🌿",color:"#065f46",bg:"#ecfdf5",border:"#6ee7b7",
    items:[{k:"flexi_al",n:"アルミフレキ（10m）",u:"箱"},{k:"flexi_hi",n:"ハイホース（7.5m）",u:"箱"},{k:"flexi_iron",n:"鉄フレキ（2m）",u:"本"},{k:"flexi_ft",n:"FTフレキ（5m）",u:"本"},{k:"flexi_ty",n:"タイロンフレキ",u:"本"}]}
};
const ALL_ITEMS = Object.values(CATS).flatMap(c=>c.items);
const ITEM_ORDER = ALL_ITEMS.map(i=>i.k);

// 状態
let state = {
  simple:{}, tees:{}, reducers:{}, newhope:{},
  tab:"phi", filterPhi:"all", filterMat:"all", showZero:false, matTab:"z", lastUpdate:null, search:{open:false,cat:'',mat:'all',phi1:'all',phi2:'all',phi3:'all',flexi:''},
  modal:null
};

function getItemDef(k){ return ALL_ITEMS.find(i=>i.k===k); }
function getCat(k){ return Object.entries(CATS).find(([,c])=>c.items.find(i=>i.k===k))?.[0]; }
function matLabel(k){ return MATS.find(m=>m.k===k)?.l||k; }
function teeLabel(t){ const m=matLabel(t.mat); return t.main+'T'+t.body+'の'+t.branch+'取り出し（'+m+'）'; }
function redLabel(r){ return `Φ${r.from}→${r.to}（${matLabel(r.mat)}）`; }
function nhLabel(n){ return `Φ${n.phi} / ${n.length}m`; }

function buildInitialSimple(){
  const d={};
  PHI.forEach(phi=>ALL_ITEMS.forEach(def=>{
    d[`${phi}_${def.k}`]={phi,itemKey:def.k,quantity:0,updatedAt:"2026-06-23"};
  }));
  return d;
}

// Firebase操作
function dbSet(path,val){ db.ref(path).set(val); }
function dbRemove(path){ db.ref(path).remove(); }
function dbPush(path,val){ db.ref(path).push(val); }

// 描画
function render(){
  const app = document.getElementById("app");
  const s = state;

  // サマリー計算
  const all = [...Object.values(s.simple),...Object.values(s.tees),...Object.values(s.reducers),...Object.values(s.newhope)];
  const zeroCount = all.filter(i=>i.quantity===0).length;
  const totalQty = all.reduce((a,i)=>a+i.quantity,0);

  // Φごとの在庫なし件数
  const phiZero = {};
  PHI.forEach(phi=>{
    phiZero[phi]=
      Object.values(s.simple).filter(i=>i.phi===phi&&i.quantity===0).length+
      Object.values(s.tees).filter(i=>i.main===phi&&i.quantity===0).length+
      Object.values(s.reducers).filter(i=>i.from===phi&&i.quantity===0).length+
      Object.values(s.newhope).filter(i=>i.phi===phi&&i.quantity===0).length;
  });

  let html = '';

  // サマリー
  html += '<div class="summary">';
  html += '<div class="sum-card"><span class="icon">⚠</span><div><div class="label">在庫なし</div><div class="val'+(zeroCount>0?' warn':'')+'">'+zeroCount+' 件</div></div></div>';
  html += '<div class="sum-card"><span class="icon">📦</span><div><div class="label">総在庫数</div><div class="val">'+totalQty+' 点</div></div></div>';
  html += '<div class="sum-card"><span class="icon">🟢</span><div><div class="label">T管</div><div class="val">'+Object.keys(s.tees).length+' 種</div></div></div>';
  html += '<div class="sum-card"><span class="icon">🔻</span><div><div class="label">レジューサー</div><div class="val">'+Object.keys(s.reducers).length+' 種</div></div></div>';
  html += '<div class="sum-card"><span class="icon">💧</span><div><div class="label">ニューホープ</div><div class="val">'+Object.keys(s.newhope).length+' 種</div></div></div>';
  html += '<div class="sum-card" style="grid-column:1/-1"><span class="icon">🕐</span><div><div class="label">最終更新</div>';
  html += '<div style="font-size:13px;font-weight:700;color:#1e293b;margin-top:2px">'+(s.lastUpdate?s.lastUpdate.content:'まだ更新なし')+'</div>';
  if(s.lastUpdate) html += '<div style="font-size:11px;color:#94a3b8;margin-top:2px">'+s.lastUpdate.time+'</div>';
  html += '</div></div>';
  html += '</div>';

  // 検索パネル
  html += renderSearch();

  // タブ
  html += '<div class="tabs">';
  html += '<button class="tab'+(s.tab==='phi'?' active':'')+'" onclick="setTab(\'phi\')">Φ別カード</button>';
  html += '<button class="tab'+(s.tab==='tee'?' active':'')+'" onclick="setTab(\'tee\')">T管</button>';
  html += '<button class="tab'+(s.tab==='reducer'?' active':'')+'" onclick="setTab(\'reducer\')">レジューサー</button>';
  html += '<button class="tab'+(s.tab==='newhope'?' active':'')+'" onclick="setTab(\'newhope\')">ニューホープ</button>';
  html += '</div>';

  // 亜鉛/ステン・ガルバ切り替え
  if(s.tab==='phi'||s.tab==='tee'){
    html += '<div style="display:flex;gap:8px;margin-bottom:12px">';
    html += '<button onclick="setMatTab(\'z\')" style="padding:7px 20px;border:none;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;background:'+(s.matTab==='z'?'#1e293b':'#e2e8f0')+';color:'+(s.matTab==='z'?'#fff':'#64748b')+'">亜鉛</button>';
    html += '<button onclick="setMatTab(\'sg\')" style="padding:7px 20px;border:none;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;background:'+(s.matTab==='sg'?'#1e293b':'#e2e8f0')+';color:'+(s.matTab==='sg'?'#fff':'#64748b')+'">ステン・ガルバ</button>';
    html += '</div>';
  }

  // フィルター
  html += '<div class="filters">';
  html += '<div><label>Φサイズ</label><select onchange="setFilterPhi(this.value)">';
  html += '<option value="all"'+(s.filterPhi==='all'?' selected':'')+'>すべて</option>';
  PHI.forEach(p=>{ html += '<option value="'+p+'"'+(s.filterPhi==p?' selected':'')+'>Φ'+p+'</option>'; });
  html += '</select></div>';
  html += '<label style="display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:#374151;padding-bottom:2px"><input type="checkbox" '+(s.showZero?'checked':'')+' onchange="setShowZero(this.checked)" style="width:15px;height:15px;border:none"> 在庫なしのみ</label>';
  html += '<div class="add-btns">';
  if(s.tab==='phi'||s.tab==='tee')     html += '<button class="add-btn" style="background:#15803d" onclick="openModal(\'tee\')">＋ T管</button>';
  if(s.tab==='phi'||s.tab==='reducer') html += '<button class="add-btn" style="background:#7c3aed" onclick="openModal(\'reducer\')">＋ レジューサー</button>';
  if(s.tab==='phi'||s.tab==='newhope') html += '<button class="add-btn" style="background:#0891b2" onclick="openModal(\'newhope\')">＋ ニューホープ</button>';
  html += '</div>';
  html += '<div class="phi-chips">';
  PHI.forEach(phi=>{
    html += '<span class="chip'+(phiZero[phi]>0?' warn':'')+(s.filterPhi==phi?' active':'')+'" onclick="togglePhi('+phi+')">Φ'+phi+(phiZero[phi]>0?' ✕'+phiZero[phi]:'')+' </span>';
  });
  html += '</div></div>';

  if(s.tab==='phi'){
    const phis = s.filterPhi==='all'?PHI:[Number(s.filterPhi)];
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px">';
    phis.forEach(phi=>{
      const simRows = Object.entries(s.simple)
        .filter(([,v])=>v.phi===phi)
        .map(([id,v])=>({id,...v,def:getItemDef(v.itemKey),cat:getCat(v.itemKey)}))
        .filter(r=>{ if(!r.def)return false; if(s.matTab==='z') return r.def.k.endsWith('_z')||r.def.k.startsWith('flexi_'); return r.def.k.endsWith('_ss')||r.def.k.endsWith('_g'); }).sort((a,b)=>ITEM_ORDER.indexOf(a.def.k)-ITEM_ORDER.indexOf(b.def.k));
      const myTees = Object.entries(s.tees)
        .filter(([,t])=>(t.main===phi||t.body===phi)&&(s.matTab==='z'?t.mat==='z':t.mat==='ss'||t.mat==='g'))
        .sort(function(a,b){ return a[1].body-b[1].body||a[1].branch-b[1].branch; });
      const myReds = Object.entries(s.reducers).filter(([,r])=>r.from===phi&&(s.matTab==='z'?r.mat==='z':r.mat==='ss'||r.mat==='g'));
      const myNh   = Object.entries(s.newhope).filter(([,n])=>n.phi===phi);
      if(s.showZero){
        const hasZero = [...simRows,...myTees.map(([,t])=>t),...myReds.map(([,r])=>r),...myNh.map(([,n])=>n)].some(i=>i.quantity===0);
        if(!hasZero) return;
      }
      const zeroN = [...simRows,...myTees.map(([,t])=>t),...myReds.map(([,r])=>r),...myNh.map(([,n])=>n)].filter(i=>i.quantity===0).length;
      html += `<div class="card${zeroN>0?' alert':''}">
        <div class="card-head${zeroN>0?' alert':''}">
          <span class="phi">Φ${phi}</span>
          ${zeroN>0?`<span class="warn">在庫なし ${zeroN}件</span>`:''}
        </div>`;
      Object.entries(CATS).forEach(([catKey,cat])=>{
        const rows = simRows.filter(r=>r.cat===catKey);
        if(!rows.length) return;
        html += `<div class="sec-head" style="background:${cat.bg};color:${cat.color};border-bottom:1px solid ${cat.border}">${cat.icon} ${cat.label}</div>`;
        rows.forEach(row=>{
          const z=row.quantity===0;
          html += `<div class="row${z?' zero':''}">
            <span class="name">${row.def.n}</span>
            <span class="qty${z?' zero':''}">${row.quantity} <span style="font-size:11px;color:#94a3b8;font-weight:400">${row.def.u}</span></span>
            ${z?'<span class="badge">在庫なし</span>':''}
            <button class="btn" onclick="openAdj('simple','${row.id}',${row.quantity},'${row.def.n}','${row.def.u}')">入出庫</button>
          </div>`;
        });
      });
      // T管
      html += `<div class="sec-head" style="background:#f0fdf4;color:#15803d;border-bottom:1px solid #bbf7d0">🟢 T管</div>`;
      if(!myTees.length) html += `<div class="row"><span style="font-size:12px;color:#94a3b8">登録なし</span></div>`;
      myTees.forEach(([id,t])=>{ const z=t.quantity===0;
        const lbl=teeLabel(t);
        html += `<div class="row${z?' zero':''}"><span class="name">${lbl}</span><span class="qty${z?' zero':''}">${t.quantity} <span style="font-size:11px;color:#94a3b8;font-weight:400">個</span></span>${z?'<span class="badge">在庫なし</span>':''}<button class="btn" onclick="openAdj('tee','${id}',${t.quantity},'${lbl}','個')">入出庫</button><button class="btn del" onclick="confirmDelete('tees/'+id, '${lbl}')">削除</button></div>`;
      });
      // レジューサー
      html += `<div class="sec-head" style="background:#f5f3ff;color:#7c3aed;border-bottom:1px solid #ddd6fe">🔻 レジューサー</div>`;
      if(!myReds.length) html += `<div class="row"><span style="font-size:12px;color:#94a3b8">登録なし</span></div>`;
      myReds.forEach(([id,r])=>{ const z=r.quantity===0;
        html += `<div class="row${z?' zero':''}"><span class="name">${redLabel(r)}</span><span class="qty${z?' zero':''}">${r.quantity} <span style="font-size:11px;color:#94a3b8;font-weight:400">個</span></span>${z?'<span class="badge">在庫なし</span>':''}<button class="btn" onclick="openAdj('reducer','${id}',${r.quantity},'${redLabel(r)}','個')">入出庫</button><button class="btn del" onclick="confirmDelete('reducers/'+id, redLabel(r))">削除</button></div>`;
      });
      // ニューホープ
      html += `<div class="sec-head" style="background:#ecfeff;color:#0891b2;border-bottom:1px solid #a5f3fc">💧 ニューホープ</div>`;
      if(!myNh.length) html += `<div class="row"><span style="font-size:12px;color:#94a3b8">登録なし</span></div>`;
      myNh.forEach(([id,n])=>{ const z=n.quantity===0;
        html += `<div class="row${z?' zero':''}"><span class="name">${n.length}m</span><span class="qty${z?' zero':''}">${n.quantity} <span style="font-size:11px;color:#94a3b8;font-weight:400">本</span></span>${z?'<span class="badge">在庫なし</span>':''}<button class="btn" onclick="openAdj('newhope','${id}',${n.quantity},'${nhLabel(n)}','本')">入出庫</button><button class="btn del" onclick="confirmDelete('newhope/'+id, nhLabel(n))">削除</button></div>`;
      });
      html += `</div>`;
    });
    html += '</div>';
  }

  if(s.tab==='tee'){
    const rows = Object.entries(s.tees).filter(([,t])=>{
      if(s.filterPhi!=='all'&&t.main!==Number(s.filterPhi))return false;
      if(s.tab==='tee'&&(s.matTab==='z'?t.mat!=='z':t.mat==='z'))return false;
      if(s.showZero&&t.quantity>0)return false;
      return true;
    }).sort((a,b)=>{
      const [,at]=a; const [,bt]=b;
      return at.main-bt.main||at.body-bt.body||at.branch-bt.branch;
    });
    if(!rows.length) html += `<div style="text-align:center;padding:40px;color:#94a3b8;background:#fff;border-radius:12px">該当なし</div>`;
    rows.forEach(([id,t])=>{ const z=t.quantity===0;
      html += `<div class="card${z?' alert':''}" style="margin-bottom:10px">
        <div style="padding:12px 14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
          <div>
            <div style="font-size:13px;font-weight:800;color:#1e293b;margin-bottom:4px">${teeLabel(t)}</div>
            <div style="font-size:12px;color:#64748b">片側：Φ${t.main} × Φ${t.body}　取り出し：Φ${t.branch}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span style="font-size:20px;font-weight:800;color:${z?'#dc2626':'#1e293b'}">${t.quantity} <span style="font-size:12px;color:#94a3b8;font-weight:400">個</span></span>
            ${z?'<span class="badge">在庫なし</span>':''}
            <button class="btn" onclick="openAdj('tee','${id}',${t.quantity},'${teeLabel(t)}','個')">入出庫</button>
            <button class="btn del" onclick="confirmDelete('tees/'+id, teeLabel(t))">削除</button>
          </div>
        </div>
      </div>`;
    });
  }

  if(s.tab==='reducer'){
    const rows = Object.entries(s.reducers).filter(([,r])=>{
      if(s.filterPhi!=='all'&&r.from!==Number(s.filterPhi))return false;
      if(s.filterMat!=='all'&&r.mat!==s.filterMat)return false; // reducer
      if(s.showZero&&r.quantity>0)return false;
      return true;
    }).sort((a,b)=>a[1].from-b[1].from||a[1].to-b[1].to);
    if(!rows.length) html += `<div style="text-align:center;padding:40px;color:#94a3b8;background:#fff;border-radius:12px">該当なし</div>`;
    rows.forEach(([id,r])=>{ const z=r.quantity===0;
      html += `<div class="card${z?' alert':''}" style="margin-bottom:10px">
        <div style="padding:12px 14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
          <div>
            <div style="font-size:13px;font-weight:800;color:#1e293b;margin-bottom:4px">${redLabel(r)}</div>
            <div style="font-size:12px;color:#64748b">Φ${r.from} → Φ${r.to}　${matLabel(r.mat)}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span style="font-size:20px;font-weight:800;color:${z?'#dc2626':'#1e293b'}">${r.quantity} <span style="font-size:12px;color:#94a3b8;font-weight:400">個</span></span>
            ${z?'<span class="badge">在庫なし</span>':''}
            <button class="btn" onclick="openAdj('reducer','${id}',${r.quantity},'${redLabel(r)}','個')">入出庫</button>
            <button class="btn del" onclick="confirmDelete('reducers/'+id, redLabel(r))">削除</button>
          </div>
        </div>
      </div>`;
    });
  }

  if(s.tab==='newhope'){
    const rows = Object.entries(s.newhope).filter(([,n])=>{
      if(s.filterPhi!=='all'&&n.phi!==Number(s.filterPhi))return false;
      if(s.showZero&&n.quantity>0)return false;
      return true;
    }).sort((a,b)=>a[1].phi-b[1].phi||a[1].length-b[1].length);
    if(!rows.length) html += `<div style="text-align:center;padding:40px;color:#94a3b8;background:#fff;border-radius:12px">該当なし</div>`;
    rows.forEach(([id,n])=>{ const z=n.quantity===0;
      html += `<div class="card${z?' alert':''}" style="margin-bottom:10px">
        <div style="padding:12px 14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
          <div>
            <div style="font-size:13px;font-weight:800;color:#0891b2;margin-bottom:4px">Φ${n.phi} / ${n.length}m</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span style="font-size:20px;font-weight:800;color:${z?'#dc2626':'#1e293b'}">${n.quantity} <span style="font-size:12px;color:#94a3b8;font-weight:400">本</span></span>
            ${z?'<span class="badge">在庫なし</span>':''}
            <button class="btn" onclick="openAdj('newhope','${id}',${n.quantity},'${nhLabel(n)}','本')">入出庫</button>
            <button class="btn del" onclick="confirmDelete('newhope/'+id, nhLabel(n))">削除</button>
          </div>
        </div>
      </div>`;
    });
  }

  // モーダル
  if(s.modal){
    const m = s.modal;
    if(m.type==='confirmDel'){
      window._delPath = m.dbPath;
      html += `<div class="modal-bg" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">
        <h2>削除の確認</h2>
        <p style="color:#64748b;font-size:14px;margin-bottom:20px"><strong>${m.label}</strong> を削除してもよいですか？<br>この操作は元に戻せません。</p>
        <div class="row-btn">
          <button class="cancel" onclick="closeModal()">キャンセル</button>
          <button class="save" style="background:#dc2626" onclick="execDelete()">削除する</button>
        </div>
      </div></div>`;
    }
    if(m.type==='adj'){
      html += `<div class="modal-bg" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">
        <h2>入出庫 — ${m.label}</h2>
        <p style="color:#64748b;font-size:14px">現在の在庫：<strong style="font-size:22px;color:${m.qty===0?'#dc2626':'#1e293b'}">${m.qty}</strong> ${m.unit}</p>
        <label>数量</label>
        <input class="adj-in" type="number" min="1" id="adj-delta" placeholder="0">
        <div class="adj-row">
          <button class="btn-in" style="background:#16a34a" onclick="applyAdj(1)">＋ 入庫</button>
          <button class="btn-in" style="background:#ea580c" onclick="applyAdj(-1)">－ 出庫</button>

      </div></div>`;

    if(m.type==='tee'){
      html += `<div class="modal-bg" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">

        <div class="grid3">
          <div><label>片側 Φ</label><select id="t-main">${PHI.map(p=>`<option value="${p}"${p===200?' selected':''}>`+'Φ'+p+'</option>').join('')}</select></div>
          <div><label>片側 Φ</label><select id="t-body">${PHI.map(p=>`<option value="${p}"${p===200?' selected':''}>`+'Φ'+p+'</option>').join('')}</select></div>
          <div><label>取り出し Φ</label><select id="t-branch">${PHI.map(p=>`<option value="${p}"${p===100?' selected':''}>`+'Φ'+p+'</option>').join('')}</select></div>
        </div>
        <div class="grid2">
          <div><label>材質</label><select id="t-mat">${MATS.map(m=>`<option value="${m.k}">${m.l}</option>`).join('')}</select></div>
          <div><label>在庫数</label><input type="number" id="t-qty" value="0" min="0"></div>
        </div>
        <div class="row-btn">
          <button class="cancel" onclick="closeModal()">キャンセル</button>
          <button class="save" onclick="saveTee()">追加</button>

      </div></div>`;
    }
    if(m.type==='reducer'){
      html += `<div class="modal-bg" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">
        <h2>レジューサーを追加</h2>
        <div class="grid2">
          <div><label>大口径（元）Φ</label><select id="r-from">${PHI.map(p=>`<option value="${p}"${p===200?' selected':''}>`+'Φ'+p+'</option>').join('')}</select></div>
          <div><label>小口径（先）Φ</label><select id="r-to">${PHI.map(p=>`<option value="${p}"${p===150?' selected':''}>`+'Φ'+p+'</option>').join('')}</select></div>
          <div><label>材質</label><select id="r-mat">${MATS.map(m=>`<option value="${m.k}">${m.l}</option>`).join('')}</select></div>
          <div><label>在庫数</label><input type="number" id="r-qty" value="0" min="0"></div>
        </div>
        <div class="row-btn">
          <button class="cancel" onclick="closeModal()">キャンセル</button>
          <button class="save" onclick="saveReducer()">追加</button>

    if(m.type==='newhope'){

// アクション
function renderSearch(){
  const sc = state.search;
  const CATS_LIST = [
    {k:'spiral',l:'スパイラル管'},{k:'elbow45',l:'エルボ 45°'},
    {k:'elbow90',l:'エルボ 90°'},{k:'nipple',l:'ニップル'},
    {k:'flexi',l:'フレキ類'},{k:'tee',l:'T管'},
    {k:'reducer',l:'レジューサー'},{k:'newhope',l:'ニューホープ'},
  ];
  const FLEXI_LIST = [
    {k:'',l:'すべて'},{k:'flexi_al',l:'アルミフレキ'},{k:'flexi_hi',l:'ハイホース'},
    {k:'flexi_iron',l:'鉄フレキ'},{k:'flexi_ft',l:'FTフレキ'},{k:'flexi_ty',l:'タイロンフレキ'},
  ];
  function chip(label, active, onclick){
    return '<button onclick="'+onclick+'" style="padding:6px 12px;border:1.5px solid '+(active?'#3b82f6':'#e2e8f0')+';border-radius:16px;background:'+(active?'#eff6ff':'#fff')+';color:'+(active?'#2563eb':'#64748b')+';font-size:12px;font-weight:700;cursor:pointer">'+label+'</button>';
  }
  function sel(val, onchange){
    var h='<select onchange="'+onchange+'" style="border:1.5px solid #e2e8f0;border-radius:7px;padding:7px 8px;font-size:13px;color:#1e293b;background:#f8fafc;width:100%">';
    h+='<option value="all"'+(val==='all'?' selected':'')+'>すべて</option>';
    PHI.forEach(function(p){ h+='<option value="'+p+'"'+(String(val)===String(p)?' selected':'')+'>Φ'+p+'</option>'; });
    return h+'</select>';
  }
  var h='<div style="background:#fff;border-radius:10px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.07);overflow:hidden">';
  h+='<div onclick="toggleSearch()" style="padding:12px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer">';
  h+='<span style="font-weight:700;font-size:14px;color:#1e293b">🔍 検索</span>';
  h+='<span style="color:#94a3b8;font-size:13px">'+(sc.open?'▲':'▼')+'</span></div>';
  if(sc.open){
    h+='<div style="padding:0 16px 16px;border-top:1px solid #f1f5f9">';
    h+='<div style="margin-top:12px"><label style="font-size:11px;font-weight:700;color:#64748b;display:block;margin-bottom:6px">カテゴリ</label><div style="display:flex;flex-wrap:wrap;gap:6px">';
    CATS_LIST.forEach(function(c){ h+=chip(c.l, sc.cat===c.k, "setSearchCat('"+c.k+"')"); });
    h+='</div></div>';
    if(sc.cat && sc.cat!=='flexi' && sc.cat!=='newhope'){
      h+='<div style="margin-top:12px"><label style="font-size:11px;font-weight:700;color:#64748b;display:block;margin-bottom:6px">材質</label><div style="display:flex;gap:6px">';
      [{k:'all',l:'すべて'}].concat(MATS).forEach(function(m){ h+=chip(m.l, sc.mat===m.k, "setSearchMat('"+m.k+"')"); });
      h+='</div></div>';
    }
    if(sc.cat==='flexi'){
      h+='<div style="margin-top:12px"><label style="font-size:11px;font-weight:700;color:#64748b;display:block;margin-bottom:6px">種類</label><div style="display:flex;flex-wrap:wrap;gap:6px">';
      FLEXI_LIST.forEach(function(f){ h+=chip(f.l, sc.flexi===f.k, "setSearchFlexi('"+f.k+"')"); });
      h+='</div></div>';
    }
    if(['spiral','elbow45','elbow90','nipple','flexi','newhope'].indexOf(sc.cat)>=0){
      h+='<div style="margin-top:12px"><label style="font-size:11px;font-weight:700;color:#64748b;display:block;margin-bottom:6px">Φサイズ</label>'+sel(sc.phi1,"setSearchPhi1(this.value)")+'</div>';
    }
    if(sc.cat==='tee'){
      h+='<div style="margin-top:12px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">';
      h+='<div><label style="font-size:11px;font-weight:700;color:#64748b;display:block;margin-bottom:4px">片側Φ</label>'+sel(sc.phi1,"setSearchPhi1(this.value)")+'</div>';
      h+='<div><label style="font-size:11px;font-weight:700;color:#64748b;display:block;margin-bottom:4px">片側Φ</label>'+sel(sc.phi2,"setSearchPhi2(this.value)")+'</div>';
      h+='<div><label style="font-size:11px;font-weight:700;color:#64748b;display:block;margin-bottom:4px">取り出しΦ</label>'+sel(sc.phi3,"setSearchPhi3(this.value)")+'</div>';
      h+='</div>';
    }
    if(sc.cat==='reducer'){
      h+='<div style="margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px">';
      h+='<div><label style="font-size:11px;font-weight:700;color:#64748b;display:block;margin-bottom:4px">大口径Φ（元）</label>'+sel(sc.phi1,"setSearchPhi1(this.value)")+'</div>';
      h+='<div><label style="font-size:11px;font-weight:700;color:#64748b;display:block;margin-bottom:4px">小口径Φ（先）</label>'+sel(sc.phi2,"setSearchPhi2(this.value)")+'</div>';
      h+='</div>';
    }
    if(sc.cat){
      var results=[];
      if(['spiral','elbow45','elbow90','nipple','flexi'].indexOf(sc.cat)>=0){
        Object.entries(state.simple).forEach(function(e){
          var v=e[1], def=getItemDef(v.itemKey);
          if(!def) return;
          if(getCat(v.itemKey)!==sc.cat) return;
          if(sc.cat!=='flexi' && sc.mat!=='all' && !v.itemKey.endsWith('_'+sc.mat)) return;
          if(sc.cat==='flexi' && sc.flexi && v.itemKey!==sc.flexi) return;
          if(sc.phi1!=='all' && v.phi!==Number(sc.phi1)) return;
          results.push({label:'Φ'+v.phi+' '+def.n, qty:v.quantity, unit:def.u||'個'});
        });
      } else if(sc.cat==='newhope'){
        Object.entries(state.newhope).forEach(function(e){
          var n=e[1];
          if(sc.phi1!=='all' && n.phi!==Number(sc.phi1)) return;
          results.push({label:nhLabel(n), qty:n.quantity, unit:'本'});
        });
      } else if(sc.cat==='tee'){
        Object.entries(state.tees).forEach(function(e){
          var t=e[1];
          if(sc.mat!=='all' && t.mat!==sc.mat) return;
          if(sc.phi1!=='all' && t.main!==Number(sc.phi1) && t.body!==Number(sc.phi1)) return;
          if(sc.phi2!=='all' && t.main!==Number(sc.phi2) && t.body!==Number(sc.phi2)) return;
          if(sc.phi3!=='all' && t.branch!==Number(sc.phi3)) return;
          results.push({label:teeLabel(t), qty:t.quantity, unit:'個'});
        });
      } else if(sc.cat==='reducer'){
        Object.entries(state.reducers).forEach(function(e){
          var r=e[1];
          if(sc.mat!=='all' && r.mat!==sc.mat) return;
          if(sc.phi1!=='all' && r.from!==Number(sc.phi1)) return;
          if(sc.phi2!=='all' && r.to!==Number(sc.phi2)) return;
          results.push({label:redLabel(r), qty:r.quantity, unit:'個'});
        });
      }
      h+='<div style="margin-top:14px;border-top:1px solid #f1f5f9;padding-top:12px">';
      h+='<div style="font-size:11px;font-weight:700;color:#64748b;margin-bottom:8px">検索結果 '+results.length+'件</div>';
      if(!results.length){
        h+='<div style="color:#94a3b8;font-size:13px;padding:8px 0">該当なし</div>';
      } else {
        results.forEach(function(r){
          h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f1f5f9">';
          h+='<span style="font-size:13px;color:#374151">'+r.label+'</span>';
          h+='<span style="font-weight:800;font-size:15px;color:'+(r.qty===0?'#dc2626':'#1e293b')+'">'+r.qty+' <span style="font-size:11px;color:#94a3b8;font-weight:400">'+r.unit+'</span></span></div>';
        });
      }
      h+='</div>';
    }
    h+='</div>';
  }
  return h+'</div>';
}

function setTab(t){ state.tab=t; render(); }
function toggleSearch(){ state.search.open=!state.search.open; render(); }
function setSearchCat(c){ state.search.cat=c; state.search.mat='all'; state.search.phi1='all'; state.search.phi2='all'; state.search.phi3='all'; state.search.flexi=''; render(); }
function setSearchMat(m){ state.search.mat=m; render(); }
function setSearchPhi1(v){ state.search.phi1=v; render(); }
function setSearchPhi2(v){ state.search.phi2=v; render(); }
function setSearchPhi3(v){ state.search.phi3=v; render(); }
function setSearchFlexi(v){ state.search.flexi=v; render(); }
function setMatTab(t){ state.matTab=t; render(); }
function setFilterPhi(v){ state.filterPhi=v; render(); }
function setFilterMat(v){ state.filterMat=v; render(); }
function setShowZero(v){ state.showZero=v; render(); }
function togglePhi(p){ state.filterPhi=state.filterPhi==p?'all':String(p); render(); }
function openModal(t){ state.modal={type:t}; render(); }
function closeModal(){ state.modal=null; render(); }
function confirmDelete(path, label){ state.modal={type:'confirmDel', dbPath:path, label:label}; render(); }
function execDelete(){ dbRemove(window._delPath); window._delPath=null; closeModal(); }

function openAdj(type,id,qty,label,unit){
  state.modal={type:'adj',dataType:type,id,qty,label,unit};
  render();
}
function applyAdj(sign){
  const d=Number(document.getElementById('adj-delta').value);
  if(!d||d<=0)return;
  const m=state.modal;
  const newQty=Math.max(0,m.qty+sign*d);
  const now=new Date();
  const today=now.toISOString().slice(0,10);
  const timeStr=`${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const base=m.dataType==='simple'?'simple':m.dataType==='tee'?'tees':m.dataType==='reducer'?'reducers':'newhope';
  dbSet(`${base}/${m.id}/quantity`,newQty);
  dbSet(`${base}/${m.id}/updatedAt`,today);
  const action=sign>0?`＋${d}`:`－${d}`;
  dbSet('lastUpdate',{content:`${m.label} ${action}${m.unit} → ${newQty}${m.unit}`,time:timeStr});
  closeModal();
}

function saveTee(){
  const today=new Date().toISOString().slice(0,10);
  const a=Number(document.getElementById('t-main').value);
  const b=Number(document.getElementById('t-body').value);
  dbPush('tees',{
    main:Math.min(a,b),
    body:Math.max(a,b),
    branch:Number(document.getElementById('t-branch').value),
    mat:document.getElementById('t-mat').value,
    quantity:Number(document.getElementById('t-qty').value),
    updatedAt:today
  });
  closeModal();
}
function saveReducer(){
  const today=new Date().toISOString().slice(0,10);
  dbPush('reducers',{
    from:Number(document.getElementById('r-from').value),
    to:Number(document.getElementById('r-to').value),
    mat:document.getElementById('r-mat').value,
    quantity:Number(document.getElementById('r-qty').value),
    updatedAt:today
  });
  closeModal();
}
function saveNewhope(){
  const today=new Date().toISOString().slice(0,10);
  dbPush('newhope',{
    phi:Number(document.getElementById('n-phi').value),
    length:Number(document.getElementById('n-len').value),
    quantity:Number(document.getElementById('n-qty').value),
    updatedAt:today
  });
  closeModal();
}

// Firebase リスナー
db.ref('lastUpdate').on('value',snap=>{ state.lastUpdate=snap.val()||null; render(); });
db.ref('simple').on('value',snap=>{
  const val=snap.val();
  if(val){ state.simple=val; }
  else { const init=buildInitialSimple(); db.ref('simple').set(init); state.simple=init; }
  render();
});
db.ref('tees').on('value',snap=>{
  const val=snap.val()||{};
  var fixes=[];
  Object.entries(val).forEach(function(entry){
    var id=entry[0], t=entry[1];
    if(Number(t.main) > Number(t.body)){
      fixes.push({id:id, main:Number(t.body), body:Number(t.main)});
    }
  });
  if(fixes.length>0){
    fixes.forEach(function(f){
      db.ref('tees/'+f.id+'/main').set(f.main);
      db.ref('tees/'+f.id+'/body').set(f.body);
    });
    // リスナーが再発火するので render はしない
  } else {
    state.tees=val;
    render();
  }
});
db.ref('reducers').on('value',snap=>{ state.reducers=snap.val()||{}; render(); });
db.ref('newhope').on('value',snap=>{ state.newhope=snap.val()||{}; render(); });
</script>

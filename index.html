  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Firebase -->

    import { getDatabase, ref, set, onValue, push, remove, update }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDdYBHxjK78-i9uswYJrrR1ZcGkyFkZoDE",
      authDomain: "duct-inventory.firebaseapp.com",
      databaseURL: "https://duct-inventory-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "duct-inventory",
      storageBucket: "duct-inventory.firebasestorage.app",
      messagingSenderId: "635885946227",
      appId: "1:635885946227:web:ad16a6461da6696bee7106"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);
    window.__db = db;
    window.__fbRef    = ref;
    window.__fbSet    = set;
    window.__fbOnValue = onValue;
    window.__fbPush   = push;
    window.__fbRemove = remove;

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect, useCallback } = React;

const PHI_SIZES = [100, 125, 150, 175, 200, 225, 250, 275, 300, 325, 350];

const SIMPLE_TYPES = {
  spiral: {
    label: "スパイラル管", icon: "🔵", color: "#2563eb", bg: "#eff6ff", border: "#bfdbfe",
    items: [
      { key: "spiral_z",  name: "スパイラル管（亜鉛）", unit: "本" },
      { key: "spiral_ss", name: "スパイラル管（ステン）", unit: "本" },
      { key: "spiral_g",  name: "スパイラル管（ガルバ）", unit: "本" },
    ],
  },
  elbow45: {
    label: "エルボ 45°", icon: "🟠", color: "#ea580c", bg: "#fff7ed", border: "#fed7aa",
    items: [
      { key: "elbow45_z",  name: "エルボ 45°（亜鉛）", unit: "個" },
      { key: "elbow45_ss", name: "エルボ 45°（ステン）", unit: "個" },
      { key: "elbow45_g",  name: "エルボ 45°（ガルバ）", unit: "個" },
    ],
  },
  elbow90: {
    label: "エルボ 90°", icon: "🟡", color: "#b45309", bg: "#fffbeb", border: "#fde68a",
    items: [
      { key: "elbow90_z",  name: "エルボ 90°（亜鉛）", unit: "個" },
      { key: "elbow90_ss", name: "エルボ 90°（ステン）", unit: "個" },
      { key: "elbow90_g",  name: "エルボ 90°（ガルバ）", unit: "個" },
    ],
  },
  nipple: {
    label: "ニップル", icon: "⚪", color: "#475569", bg: "#f8fafc", border: "#e2e8f0",
    items: [
      { key: "nipple_z",  name: "ニップル（亜鉛）", unit: "個" },
      { key: "nipple_ss", name: "ニップル（ステン）", unit: "個" },
      { key: "nipple_g",  name: "ニップル（ガルバ）", unit: "個" },
    ],
  },
  flexi: {
    label: "フレキ類", icon: "🌿", color: "#065f46", bg: "#ecfdf5", border: "#6ee7b7",
    items: [
      { key: "flexi_al",   name: "アルミフレキ（10m）", unit: "本" },
      { key: "flexi_iron", name: "鉄フレキ（2m）",      unit: "本" },
      { key: "flexi_hi",   name: "ハイホース（7.5m）",  unit: "本" },
      { key: "flexi_ft",   name: "FTフレキ（5m）",      unit: "本" },
      { key: "flexi_ty",   name: "タイロンフレキ",      unit: "本" },
    ],
  },
};

const ALL_SIMPLE_DEFS = Object.values(SIMPLE_TYPES).flatMap(t => t.items);
function getSimpleCat(key) {
  for (const cat of Object.keys(SIMPLE_TYPES)) {
    if (SIMPLE_TYPES[cat].items.find(i => i.key === key)) return cat;
  }
  return null;
}

const MATERIALS = [
  { key: "z",  label: "亜鉛" },
  { key: "ss", label: "ステン" },
  { key: "g",  label: "ガルバ" },
];

const ZERO_COLOR = "#dc2626";

function buildInitialSimple() {
  const data = {};
  PHI_SIZES.forEach(phi => {
    ALL_SIMPLE_DEFS.forEach(def => {
      const id = `${phi}_${def.key}`;
      data[id] = { phi, itemKey: def.key, quantity: 0, updatedAt: "2026-06-23" };
    });
  });
  return data;
}

function teeLabel(t) {
  const mat = MATERIALS.find(m => m.key === t.mat)?.label;
  if (t.main === t.body) return `${t.main}T${t.body}の${t.branch}取り出し（${mat}）`;
  return `${t.main}×${t.body}Tの${t.branch}取り出し（${mat}）`;
}
function reducerLabel(r) { return `Φ${r.from}→${r.to}（${MATERIALS.find(m => m.key === r.mat)?.label}）`; }
function nhLabel(n)      { return `Φ${n.phi} / ${n.length}m`; }

// ---- Firebase hooks ----
function useFirebase() {
  const [ready, setReady] = useState(!!window.__fbReady);
  useEffect(() => {
    if (window.__fbReady) return;
    const h = () => setReady(true);
    window.addEventListener("fbReady", h);
    return () => window.removeEventListener("fbReady", h);
  }, []);
  return ready;
}

function dbSet(path, val)    { window.__fbSet(window.__fbRef(window.__db, path), val); }
function dbUpdate(path, val) { window.__fbUpdate(window.__fbRef(window.__db, path), val); }
function dbRemove(path)      { window.__fbRemove(window.__fbRef(window.__db, path)); }
function dbPush(path, val)   { return window.__fbPush(window.__fbRef(window.__db, path), val); }
function dbListen(path, cb)  {
  const r = window.__fbRef(window.__db, path);
  return window.__fbOnValue(r, snap => cb(snap.val()));
}

// ---- UI部品 ----
const ZERO_BADGE = <span style={{ padding:"2px 8px", borderRadius:"10px", fontSize:"11px", fontWeight:700, background:"#fee2e2", color:ZERO_COLOR, border:"1px solid #fca5a5", whiteSpace:"nowrap" }}>在庫なし</span>;
function ZeroBadge({ qty }) { return qty === 0 ? ZERO_BADGE : null; }

function Modal({ title, onClose, children }) {
  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(15,23,42,0.5)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:200 }}>
      <div style={{ background:"#fff", borderRadius:"14px", padding:"28px", width:"min(92vw,460px)", boxShadow:"0 20px 60px rgba(0,0,0,0.2)", maxHeight:"90vh", overflowY:"auto" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"20px" }}>
          <h2 style={{ margin:0, fontSize:"16px", fontWeight:800, color:"#1e293b" }}>{title}</h2>
          <button onClick={onClose} style={{ background:"none", border:"none", fontSize:"22px", cursor:"pointer", color:"#94a3b8" }}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
}

const inp = { width:"100%", padding:"8px 10px", border:"1.5px solid #e2e8f0", borderRadius:"7px", fontSize:"13px", color:"#1e293b", background:"#f8fafc", boxSizing:"border-box" };
function FL({ label, children }) {
  return <div style={{ marginBottom:"13px" }}><label style={{ display:"block", fontSize:"11px", fontWeight:700, color:"#64748b", marginBottom:"5px" }}>{label}</label>{children}</div>;
}

function AdjustModal({ title, item, unit, onApply, onClose }) {
  const [delta, setDelta] = useState("");
  const apply = sign => { const d = Number(delta); if (!delta || isNaN(d) || d <= 0) return; onApply(sign * d); };
  return (
    <Modal title={title} onClose={onClose}>
      <p style={{ color:"#64748b", fontSize:"14px", marginTop:0 }}>
        現在の在庫：<strong style={{ color: item.quantity===0 ? ZERO_COLOR : "#1e293b", fontSize:"22px" }}>{item.quantity}</strong>
        <span style={{ fontSize:"13px", color:"#94a3b8", marginLeft:"4px" }}>{unit||"個"}</span>
      </p>
      <FL label="数量">
        <input style={{ ...inp, fontSize:"20px", fontWeight:700, textAlign:"center", padding:"12px" }}
          type="number" min="1" value={delta} onChange={e => setDelta(e.target.value)} placeholder="0" autoFocus />
      </FL>
      <div style={{ display:"flex", gap:"10px" }}>
        <button onClick={() => apply(1)}  style={{ flex:1, padding:"13px", border:"none", borderRadius:"8px", background:"#16a34a", color:"#fff", fontWeight:800, fontSize:"15px", cursor:"pointer" }}>＋ 入庫</button>
        <button onClick={() => apply(-1)} style={{ flex:1, padding:"13px", border:"none", borderRadius:"8px", background:"#ea580c", color:"#fff", fontWeight:800, fontSize:"15px", cursor:"pointer" }}>－ 出庫</button>
      </div>
      <button onClick={onClose} style={{ width:"100%", marginTop:"10px", padding:"9px", border:"1.5px solid #e2e8f0", borderRadius:"8px", background:"#fff", color:"#94a3b8", fontWeight:600, cursor:"pointer", fontSize:"13px" }}>キャンセル</button>
    </Modal>
  );
}

function TeeForm({ onSave, onClose }) {
  const [f, setF] = useState({ main:200, body:200, branch:100, mat:"z", quantity:0 });
  const s = (k,v) => setF(p => ({...p,[k]:v}));
  return <>
    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"10px" }}>
      <FL label="片側 Φ"><select style={inp} value={f.main} onChange={e=>s("main",Number(e.target.value))}>{PHI_SIZES.map(p=><option key={p} value={p}>Φ{p}</option>)}</select></FL>
      <FL label="片側 Φ"><select style={inp} value={f.body} onChange={e=>s("body",Number(e.target.value))}>{PHI_SIZES.map(p=><option key={p} value={p}>Φ{p}</option>)}</select></FL>
      <FL label="取り出し Φ"><select style={inp} value={f.branch} onChange={e=>s("branch",Number(e.target.value))}>{PHI_SIZES.map(p=><option key={p} value={p}>Φ{p}</option>)}</select></FL>
    </div>
    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"10px" }}>
      <FL label="材質"><select style={inp} value={f.mat} onChange={e=>s("mat",e.target.value)}>{MATERIALS.map(m=><option key={m.key} value={m.key}>{m.label}</option>)}</select></FL>
      <FL label="在庫数"><input style={inp} type="number" min="0" value={f.quantity} onChange={e=>s("quantity",Number(e.target.value))} /></FL>
    </div>
    <p style={{ fontSize:"12px", color:"#64748b", margin:"4px 0 16px" }}>プレビュー：<strong>{teeLabel(f)}</strong></p>
    <div style={{ display:"flex", gap:"10px", justifyContent:"flex-end" }}>
      <button onClick={onClose} style={{ padding:"8px 18px", border:"1.5px solid #e2e8f0", borderRadius:"7px", background:"#fff", color:"#64748b", fontWeight:600, cursor:"pointer", fontSize:"13px" }}>キャンセル</button>
      <button onClick={()=>onSave(f)} style={{ padding:"8px 22px", border:"none", borderRadius:"7px", background:"#3b82f6", color:"#fff", fontWeight:700, cursor:"pointer", fontSize:"13px" }}>追加</button>
    </div>
  </>;
}

function ReducerForm({ onSave, onClose }) {
  const [f, setF] = useState({ from:200, to:150, mat:"z", quantity:0 });
  const s = (k,v) => setF(p => ({...p,[k]:v}));
  return <>
    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"10px" }}>
      <FL label="大口径（元）Φ"><select style={inp} value={f.from} onChange={e=>s("from",Number(e.target.value))}>{PHI_SIZES.map(p=><option key={p} value={p}>Φ{p}</option>)}</select></FL>
      <FL label="小口径（先）Φ"><select style={inp} value={f.to} onChange={e=>s("to",Number(e.target.value))}>{PHI_SIZES.map(p=><option key={p} value={p}>Φ{p}</option>)}</select></FL>
      <FL label="材質"><select style={inp} value={f.mat} onChange={e=>s("mat",e.target.value)}>{MATERIALS.map(m=><option key={m.key} value={m.key}>{m.label}</option>)}</select></FL>
      <FL label="在庫数"><input style={inp} type="number" min="0" value={f.quantity} onChange={e=>s("quantity",Number(e.target.value))} /></FL>
    </div>
    <p style={{ fontSize:"12px", color:"#64748b", margin:"4px 0 16px" }}>プレビュー：<strong>{reducerLabel(f)}</strong></p>
    <div style={{ display:"flex", gap:"10px", justifyContent:"flex-end" }}>
      <button onClick={onClose} style={{ padding:"8px 18px", border:"1.5px solid #e2e8f0", borderRadius:"7px", background:"#fff", color:"#64748b", fontWeight:600, cursor:"pointer", fontSize:"13px" }}>キャンセル</button>
      <button onClick={()=>onSave(f)} style={{ padding:"8px 22px", border:"none", borderRadius:"7px", background:"#3b82f6", color:"#fff", fontWeight:700, cursor:"pointer", fontSize:"13px" }}>追加</button>
    </div>
  </>;
}

function NewhopeForm({ onSave, onClose }) {
  const [f, setF] = useState({ phi:150, length:1.0, quantity:0 });
  const s = (k,v) => setF(p => ({...p,[k]:v}));
  return <>
    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"10px" }}>
      <FL label="Φ"><select style={inp} value={f.phi} onChange={e=>s("phi",Number(e.target.value))}>{PHI_SIZES.map(p=><option key={p} value={p}>Φ{p}</option>)}</select></FL>
      <FL label="長さ（m）"><input style={inp} type="number" min="0.1" step="0.1" value={f.length} onChange={e=>s("length",Number(e.target.value))} /></FL>
      <FL label="本数"><input style={inp} type="number" min="0" value={f.quantity} onChange={e=>s("quantity",Number(e.target.value))} /></FL>
    </div>
    <p style={{ fontSize:"12px", color:"#64748b", margin:"4px 0 16px" }}>プレビュー：<strong>ニューホープ Φ{f.phi} / {f.length}m × {f.quantity}本</strong></p>
    <div style={{ display:"flex", gap:"10px", justifyContent:"flex-end" }}>
      <button onClick={onClose} style={{ padding:"8px 18px", border:"1.5px solid #e2e8f0", borderRadius:"7px", background:"#fff", color:"#64748b", fontWeight:600, cursor:"pointer", fontSize:"13px" }}>キャンセル</button>
      <button onClick={()=>onSave(f)} style={{ padding:"8px 22px", border:"none", borderRadius:"7px", background:"#0891b2", color:"#fff", fontWeight:700, cursor:"pointer", fontSize:"13px" }}>追加</button>
    </div>
  </>;
}

function SectionHeader({ icon, label, color, bg, border }) {
  return <div style={{ padding:"7px 14px", background:bg, borderBottom:`1px solid ${border}` }}><span style={{ fontWeight:800, fontSize:"12px", color, letterSpacing:"0.04em" }}>{icon} {label}</span></div>;
}

function SimpleRow({ row, onAdjust }) {
  const isEmpty = row.quantity === 0;
  return (
    <div style={{ padding:"8px 14px", display:"flex", alignItems:"center", gap:"8px", borderBottom:"1px solid #f1f5f9", background: isEmpty?"#fff8f8":"#fff" }}>
      <span style={{ fontSize:"13px", color:"#374151", flex:"1 1 140px", minWidth:0 }}>{row.def.name}</span>
      <span style={{ fontWeight:800, fontSize:"15px", color: isEmpty?ZERO_COLOR:"#1e293b", whiteSpace:"nowrap" }}>{row.quantity} <span style={{ fontSize:"11px", color:"#94a3b8", fontWeight:400 }}>{row.def.unit}</span></span>
      <ZeroBadge qty={row.quantity} />
      <button onClick={onAdjust} style={{ padding:"3px 10px", border:"1.5px solid #e2e8f0", borderRadius:"5px", background:"#fff", fontSize:"11px", cursor:"pointer", fontWeight:700, color:"#475569", marginLeft:"auto" }}>入出庫</button>
    </div>
  );
}

function ComboRow({ item, label, onAdjust, onDelete, unit }) {
  const isEmpty = item.quantity === 0;
  return (
    <div style={{ padding:"8px 14px", display:"flex", alignItems:"center", gap:"8px", borderBottom:"1px solid #f1f5f9", background: isEmpty?"#fff8f8":"#fff", flexWrap:"wrap" }}>
      <span style={{ fontSize:"13px", color:"#374151", flex:"1 1 160px", minWidth:0 }}>{label}</span>
      <span style={{ fontWeight:800, fontSize:"15px", color: isEmpty?ZERO_COLOR:"#1e293b", whiteSpace:"nowrap" }}>{item.quantity} <span style={{ fontSize:"11px", color:"#94a3b8", fontWeight:400 }}>{unit||"個"}</span></span>
      <ZeroBadge qty={item.quantity} />
      <div style={{ display:"flex", gap:"5px", marginLeft:"auto" }}>
        <button onClick={onAdjust} style={{ padding:"3px 9px", border:"1.5px solid #e2e8f0", borderRadius:"5px", background:"#fff", fontSize:"11px", cursor:"pointer", fontWeight:700, color:"#475569" }}>入出庫</button>
        <button onClick={onDelete} style={{ padding:"3px 9px", border:"1.5px solid #fecaca", borderRadius:"5px", background:"#fef2f2", fontSize:"11px", cursor:"pointer", fontWeight:700, color:"#dc2626" }}>削除</button>
      </div>
    </div>
  );
}

function PhiCard({ phi, simpleStock, teeStock, reducerStock, newhopeStock, filterMat, onSimpleAdjust, onTeeAdjust, onTeeDelete, onRedAdjust, onRedDelete, onNhAdjust, onNhDelete }) {
  const simpleRows = Object.entries(simpleStock)
    .filter(([,s]) => s.phi === phi)
    .map(([id,s]) => ({ id, ...s, def: ALL_SIMPLE_DEFS.find(d => d.key === s.itemKey), cat: getSimpleCat(s.itemKey) }))
    .filter(r => filterMat === "all" || r.def.key.endsWith(`_${filterMat}`));
  const myTees     = Object.entries(teeStock).filter(([,t]) => t.main === phi && (filterMat==="all"||t.mat===filterMat));
  const myReducers = Object.entries(reducerStock).filter(([,r]) => r.from === phi && (filterMat==="all"||r.mat===filterMat));
  const myNh       = Object.entries(newhopeStock).filter(([,n]) => n.phi === phi);
  const zeroN = [...simpleRows,...myTees.map(([,t])=>t),...myReducers.map(([,r])=>r),...myNh.map(([,n])=>n)].filter(i=>i.quantity===0).length;
  return (
    <div style={{ background:"#fff", borderRadius:"12px", overflow:"hidden", boxShadow:"0 1px 4px rgba(0,0,0,0.08)", border: zeroN>0?"2px solid #fca5a5":"2px solid #e2e8f0" }}>
      <div style={{ padding:"10px 14px", display:"flex", justifyContent:"space-between", alignItems:"center", background: zeroN>0?"#fef2f2":"#f8fafc", borderBottom:"1px solid #e2e8f0" }}>
        <span style={{ fontWeight:800, fontSize:"16px", color:"#1e293b" }}>Φ{phi}</span>
        {zeroN>0 && <span style={{ fontSize:"12px", color:ZERO_COLOR, fontWeight:700 }}>在庫なし {zeroN}件</span>}
      </div>
      {Object.keys(SIMPLE_TYPES).map(cat => {
        const catRows = simpleRows.filter(r => r.cat === cat);
        if (catRows.length === 0) return null;
        const t = SIMPLE_TYPES[cat];
        return <div key={cat}><SectionHeader icon={t.icon} label={t.label} color={t.color} bg={t.bg} border={t.border} />{catRows.map(row=><SimpleRow key={row.id} row={row} onAdjust={()=>onSimpleAdjust(row)} />)}</div>;
      })}
      <div>
        <SectionHeader icon="🟢" label="T管" color="#15803d" bg="#f0fdf4" border="#bbf7d0" />
        {myTees.length===0 ? <p style={{ fontSize:"12px", color:"#94a3b8", padding:"8px 14px", margin:0 }}>登録なし</p>
          : myTees.map(([id,t])=><ComboRow key={id} item={t} label={teeLabel(t)} onAdjust={()=>onTeeAdjust(id,t)} onDelete={()=>onTeeDelete(id)} />)}
      </div>
      <div>
        <SectionHeader icon="🔻" label="レジューサー" color="#7c3aed" bg="#f5f3ff" border="#ddd6fe" />
        {myReducers.length===0 ? <p style={{ fontSize:"12px", color:"#94a3b8", padding:"8px 14px", margin:0 }}>登録なし</p>
          : myReducers.map(([id,r])=><ComboRow key={id} item={r} label={reducerLabel(r)} onAdjust={()=>onRedAdjust(id,r)} onDelete={()=>onRedDelete(id)} />)}
      </div>
      <div>
        <SectionHeader icon="💧" label="ニューホープ" color="#0891b2" bg="#ecfeff" border="#a5f3fc" />
        {myNh.length===0 ? <p style={{ fontSize:"12px", color:"#94a3b8", padding:"8px 14px", margin:0 }}>登録なし</p>
          : myNh.map(([id,n])=><ComboRow key={id} item={n} label={`${n.length}m`} unit="本" onAdjust={()=>onNhAdjust(id,n)} onDelete={()=>onNhDelete(id)} />)}
      </div>
    </div>
  );
}

// ---- メイン ----
function App() {
  const fbReady = useFirebase();
  const [loading, setLoading] = useState(true);
  const [simple,   setSimple]   = useState({});
  const [tees,     setTees]     = useState({});
  const [reducers, setReducers] = useState({});
  const [newhope,  setNewhope]  = useState({});

  const [tab,          setTab]          = useState("phi");
  const [filterPhi,    setFilterPhi]    = useState("all");
  const [filterMat,    setFilterMat]    = useState("all");
  const [showZeroOnly, setShowZeroOnly] = useState(false);
  const [adjustTarget, setAdjustTarget] = useState(null);
  const [addModal,     setAddModal]     = useState(null);

  // Firebase初期データ投入 & リスナー
  useEffect(() => {
    if (!fbReady) return;
    // simple在庫を初期化（存在しない場合のみ）
    dbListen("simple", val => {
      if (val) {
        setSimple(val);
        setLoading(false);
      } else {
        // 初回：初期データを書き込む
        const initial = buildInitialSimple();
        dbSet("simple", initial);
      }
    });
    dbListen("tees",     val => setTees(val||{}));
    dbListen("reducers", val => setReducers(val||{}));
    dbListen("newhope",  val => setNewhope(val||{}));
  }, [fbReady]);

  const today = new Date().toISOString().slice(0,10);

  const applyAdjust = (signed) => {
    if (!adjustTarget) return;
    const { type, id, item } = adjustTarget;
    const newQty = Math.max(0, item.quantity + signed);
    const path = type === "simple" ? `simple/${id}/quantity`
               : type === "tee"    ? `tees/${id}/quantity`
               : type === "reducer"? `reducers/${id}/quantity`
               :                     `newhope/${id}/quantity`;
    dbSet(path, newQty);
    const datePath = path.replace("/quantity", "/updatedAt");
    dbSet(datePath, today);
    setAdjustTarget(null);
  };

  const addTee     = f => { dbPush("tees",     {...f, updatedAt:today}); setAddModal(null); };
  const addReducer = f => { dbPush("reducers", {...f, updatedAt:today}); setAddModal(null); };
  const addNewhope = f => { dbPush("newhope",  {...f, updatedAt:today}); setAddModal(null); };

  const allItems = [...Object.values(simple),...Object.values(tees),...Object.values(reducers),...Object.values(newhope)];
  const zeroCount = allItems.filter(i=>i.quantity===0).length;
  const totalQty  = allItems.reduce((a,i)=>a+i.quantity,0);

  const phiSummary = useMemo(() => PHI_SIZES.map(phi => {
    const zN =
      Object.values(simple).filter(s=>s.phi===phi&&s.quantity===0).length +
      Object.values(tees).filter(t=>t.main===phi&&t.quantity===0).length +
      Object.values(reducers).filter(r=>r.from===phi&&r.quantity===0).length +
      Object.values(newhope).filter(n=>n.phi===phi&&n.quantity===0).length;
    return {phi,zN};
  }), [simple,tees,reducers,newhope]);

  const filteredPhis = filterPhi==="all" ? PHI_SIZES : [Number(filterPhi)];

  const teeRows = useMemo(() => Object.entries(tees).filter(([,t]) => {
    if (filterPhi!=="all" && t.main!==Number(filterPhi)) return false;
    if (filterMat!=="all" && t.mat!==filterMat) return false;
    if (showZeroOnly && t.quantity>0) return false;
    return true;
  }), [tees,filterPhi,filterMat,showZeroOnly]);

  const redRows = useMemo(() => Object.entries(reducers).filter(([,r]) => {
    if (filterPhi!=="all" && r.from!==Number(filterPhi)) return false;
    if (filterMat!=="all" && r.mat!==filterMat) return false;
    if (showZeroOnly && r.quantity>0) return false;
    return true;
  }), [reducers,filterPhi,filterMat,showZeroOnly]);

  const nhRows = useMemo(() => Object.entries(newhope)
    .filter(([,n]) => {
      if (filterPhi!=="all" && n.phi!==Number(filterPhi)) return false;
      if (showZeroOnly && n.quantity>0) return false;
      return true;
    })
    .sort((a,b)=>a[1].phi-b[1].phi||a[1].length-b[1].length),
  [newhope,filterPhi,showZeroOnly]);

  const btnStyle = active => ({ padding:"6px 12px", border:"none", borderRadius:"6px", fontSize:"12px", fontWeight:700, cursor:"pointer", background: active?"#3b82f6":"#334155", color: active?"#fff":"#94a3b8" });
  const tableHead = (cols,color,bg,border) => <thead><tr style={{ background:bg, borderBottom:`2px solid ${border}` }}>{cols.map(h=><th key={h} style={{ padding:"11px 12px", textAlign:"left", fontSize:"11px", fontWeight:700, color, whiteSpace:"nowrap" }}>{h}</th>)}</tr></thead>;
  const adjBtn = onClick => <button onClick={onClick} style={{ padding:"3px 9px", border:"1.5px solid #e2e8f0", borderRadius:"5px", background:"#fff", fontSize:"11px", cursor:"pointer", fontWeight:700, color:"#475569" }}>入出庫</button>;
  const delBtn = onClick => <button onClick={onClick} style={{ padding:"3px 9px", border:"1.5px solid #fecaca", borderRadius:"5px", background:"#fef2f2", fontSize:"11px", cursor:"pointer", fontWeight:700, color:"#dc2626" }}>削除</button>;

  if (!fbReady || loading) return (
    <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh", flexDirection:"column", gap:"16px", color:"#64748b" }}>
      <div style={{ fontSize:"40px" }}>🌀</div>
      <div style={{ fontSize:"16px", fontWeight:700 }}>データを読み込み中...</div>
    </div>
  );

  return (
    <div style={{ minHeight:"100vh", background:"#f1f5f9" }}>
      <div style={{ background:"#1e293b", color:"#fff", padding:"0 16px", display:"flex", alignItems:"center", justifyContent:"space-between", height:"54px", boxShadow:"0 2px 8px rgba(0,0,0,0.3)", flexWrap:"wrap", gap:"6px" }}>
        <div style={{ display:"flex", alignItems:"center", gap:"8px" }}>
          <span style={{ fontSize:"20px" }}>🌀</span>
          <span style={{ fontWeight:800, fontSize:"15px" }}>ダクト在庫管理</span>
        </div>
        <div style={{ display:"flex", gap:"5px", flexWrap:"wrap" }}>
          <button style={btnStyle(tab==="phi")}     onClick={()=>setTab("phi")}>Φ別カード</button>
          <button style={btnStyle(tab==="tee")}     onClick={()=>setTab("tee")}>T管</button>
          <button style={btnStyle(tab==="reducer")} onClick={()=>setTab("reducer")}>レジューサー</button>
          <button style={btnStyle(tab==="newhope")} onClick={()=>setTab("newhope")}>ニューホープ</button>
        </div>
      </div>

      <div style={{ maxWidth:"1200px", margin:"0 auto", padding:"20px 14px" }}>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))", gap:"10px", marginBottom:"18px" }}>
          {[
            { label:"在庫なし", value:`${zeroCount} 件`, icon:"⚠", color: zeroCount>0?ZERO_COLOR:undefined },
            { label:"総在庫数", value:`${totalQty.toLocaleString()} 点`, icon:"📦" },
            { label:"T管",      value:`${Object.keys(tees).length} 種`, icon:"🟢" },
            { label:"レジューサー", value:`${Object.keys(reducers).length} 種`, icon:"🔻" },
            { label:"ニューホープ", value:`${Object.keys(newhope).length} 種`, icon:"💧" },
          ].map(c=>(
            <div key={c.label} style={{ background:"#fff", borderRadius:"10px", padding:"12px 14px", boxShadow:"0 1px 3px rgba(0,0,0,0.07)", display:"flex", alignItems:"center", gap:"10px" }}>
              <span style={{ fontSize:"22px" }}>{c.icon}</span>
              <div><div style={{ fontSize:"10px", color:"#94a3b8", fontWeight:600 }}>{c.label}</div><div style={{ fontSize:"18px", fontWeight:800, color:c.color||"#1e293b" }}>{c.value}</div></div>
            </div>
          ))}
        </div>

        <div style={{ background:"#fff", borderRadius:"10px", padding:"12px 16px", marginBottom:"16px", boxShadow:"0 1px 3px rgba(0,0,0,0.07)", display:"flex", flexWrap:"wrap", gap:"10px", alignItems:"flex-end" }}>
          <div>
            <label style={{ fontSize:"11px", fontWeight:700, color:"#64748b", display:"block", marginBottom:"4px" }}>Φサイズ</label>
            <select value={filterPhi} onChange={e=>setFilterPhi(e.target.value)} style={{ ...inp, width:"110px" }}>
              <option value="all">すべて</option>
              {PHI_SIZES.map(p=><option key={p} value={p}>Φ{p}</option>)}
            </select>
          </div>
          <div>
            <label style={{ fontSize:"11px", fontWeight:700, color:"#64748b", display:"block", marginBottom:"4px" }}>材質</label>
            <select value={filterMat} onChange={e=>setFilterMat(e.target.value)} style={{ ...inp, width:"100px" }}>
              <option value="all">すべて</option>
              {MATERIALS.map(m=><option key={m.key} value={m.key}>{m.label}</option>)}
            </select>
          </div>
          <label style={{ display:"flex", alignItems:"center", gap:"6px", fontSize:"13px", color:"#374151", cursor:"pointer", fontWeight:600, paddingBottom:"2px" }}>
            <input type="checkbox" checked={showZeroOnly} onChange={e=>setShowZeroOnly(e.target.checked)} style={{ width:"15px", height:"15px" }} />
            在庫なしのみ
          </label>
          <div style={{ marginLeft:"auto", display:"flex", gap:"6px", flexWrap:"wrap" }}>
            {(tab==="phi"||tab==="tee") && <button onClick={()=>setAddModal("tee")} style={{ padding:"7px 14px", border:"none", borderRadius:"7px", background:"#15803d", color:"#fff", fontWeight:700, fontSize:"12px", cursor:"pointer" }}>＋ T管</button>}
            {(tab==="phi"||tab==="reducer") && <button onClick={()=>setAddModal("reducer")} style={{ padding:"7px 14px", border:"none", borderRadius:"7px", background:"#7c3aed", color:"#fff", fontWeight:700, fontSize:"12px", cursor:"pointer" }}>＋ レジューサー</button>}
            {(tab==="phi"||tab==="newhope") && <button onClick={()=>setAddModal("newhope")} style={{ padding:"7px 14px", border:"none", borderRadius:"7px", background:"#0891b2", color:"#fff", fontWeight:700, fontSize:"12px", cursor:"pointer" }}>＋ ニューホープ</button>}
          </div>
          <div style={{ width:"100%", display:"flex", flexWrap:"wrap", gap:"4px" }}>
            {phiSummary.map(({phi,zN})=>(
              <span key={phi} onClick={()=>setFilterPhi(prev=>prev===String(phi)?"all":String(phi))} style={{
                padding:"3px 10px", borderRadius:"14px", fontSize:"11px", fontWeight:700, cursor:"pointer",
                background: filterPhi===String(phi)?"#1e293b":zN>0?"#fee2e2":"#f1f5f9",
                color: filterPhi===String(phi)?"#fff":zN>0?ZERO_COLOR:"#94a3b8",
                border:`1px solid ${filterPhi===String(phi)?"#1e293b":zN>0?"#fca5a5":"#e2e8f0"}`,
              }}>Φ{phi}{zN>0?` ✕${zN}`:""}</span>
            ))}
          </div>
        </div>

        {tab==="phi" && (
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))", gap:"14px" }}>
            {filteredPhis.map(phi=>(
              <PhiCard key={phi} phi={phi}
                simpleStock={simple} teeStock={tees} reducerStock={reducers} newhopeStock={newhope}
                filterMat={filterMat}
                onSimpleAdjust={row=>setAdjustTarget({type:"simple",id:row.id,item:row,label:`Φ${row.phi} ${row.def.name}`,unit:row.def.unit})}
                onTeeAdjust={(id,t)=>setAdjustTarget({type:"tee",id,item:t,label:teeLabel(t)})}
                onTeeDelete={id=>dbRemove(`tees/${id}`)}
                onRedAdjust={(id,r)=>setAdjustTarget({type:"reducer",id,item:r,label:reducerLabel(r)})}
                onRedDelete={id=>dbRemove(`reducers/${id}`)}
                onNhAdjust={(id,n)=>setAdjustTarget({type:"newhope",id,item:n,label:nhLabel(n),unit:"本"})}
                onNhDelete={id=>dbRemove(`newhope/${id}`)}
              />
            ))}
          </div>
        )}

        {tab==="tee" && (
          <div style={{ background:"#fff", borderRadius:"12px", boxShadow:"0 1px 4px rgba(0,0,0,0.07)", overflow:"auto" }}>
            <table style={{ width:"100%", borderCollapse:"collapse", minWidth:"480px" }}>
              {tableHead(["片側Φ","片側Φ","取り出しΦ","材質","在庫","状態","操作"],"#15803d","#f0fdf4","#bbf7d0")}
              <tbody>
                {teeRows.length===0 ? <tr><td colSpan={7} style={{ textAlign:"center", padding:"40px", color:"#94a3b8" }}>該当なし</td></tr>
                  : teeRows.map(([id,t],i)=>(
                  <tr key={id} style={{ borderBottom:"1px solid #f1f5f9", background:t.quantity===0?"#fff8f8":i%2===0?"#fff":"#f9fafb" }}>
                    <td style={{ padding:"10px 12px", fontWeight:800, color:"#1e293b" }}>Φ{t.main}</td>
                    <td style={{ padding:"10px 12px", fontWeight:700, color:t.body!==t.main?"#ea580c":"#94a3b8" }}>Φ{t.body}</td>
                    <td style={{ padding:"10px 12px", fontWeight:700, color:"#374151" }}>Φ{t.branch}</td>
                    <td style={{ padding:"10px 12px", fontSize:"13px", color:"#64748b" }}>{MATERIALS.find(m=>m.key===t.mat)?.label}</td>
                    <td style={{ padding:"10px 12px", fontWeight:800, color:t.quantity===0?ZERO_COLOR:"#1e293b", fontSize:"15px" }}>{t.quantity}</td>
                    <td style={{ padding:"10px 12px" }}><ZeroBadge qty={t.quantity} /></td>
                    <td style={{ padding:"10px 12px" }}><div style={{ display:"flex", gap:"5px" }}>{adjBtn(()=>setAdjustTarget({type:"tee",id,item:t,label:teeLabel(t)}))}{delBtn(()=>dbRemove(`tees/${id}`))}</div></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}

        {tab==="reducer" && (
          <div style={{ background:"#fff", borderRadius:"12px", boxShadow:"0 1px 4px rgba(0,0,0,0.07)", overflow:"auto" }}>
            <table style={{ width:"100%", borderCollapse:"collapse", minWidth:"480px" }}>
              {tableHead(["大口径Φ（元）","小口径Φ（先）","材質","在庫","状態","操作"],"#7c3aed","#f5f3ff","#ddd6fe")}
              <tbody>
                {redRows.length===0 ? <tr><td colSpan={6} style={{ textAlign:"center", padding:"40px", color:"#94a3b8" }}>該当なし</td></tr>
                  : redRows.map(([id,r],i)=>(
                  <tr key={id} style={{ borderBottom:"1px solid #f1f5f9", background:r.quantity===0?"#fff8f8":i%2===0?"#fff":"#f9fafb" }}>
                    <td style={{ padding:"10px 12px", fontWeight:800, color:"#1e293b" }}>Φ{r.from}</td>
                    <td style={{ padding:"10px 12px", fontWeight:700, color:"#374151" }}>Φ{r.to}</td>
                    <td style={{ padding:"10px 12px", fontSize:"13px", color:"#64748b" }}>{MATERIALS.find(m=>m.key===r.mat)?.label}</td>
                    <td style={{ padding:"10px 12px", fontWeight:800, color:r.quantity===0?ZERO_COLOR:"#1e293b", fontSize:"15px" }}>{r.quantity}</td>
                    <td style={{ padding:"10px 12px" }}><ZeroBadge qty={r.quantity} /></td>
                    <td style={{ padding:"10px 12px" }}><div style={{ display:"flex", gap:"5px" }}>{adjBtn(()=>setAdjustTarget({type:"reducer",id,item:r,label:reducerLabel(r)}))}{delBtn(()=>dbRemove(`reducers/${id}`))}</div></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}

        {tab==="newhope" && (
          <div style={{ background:"#fff", borderRadius:"12px", boxShadow:"0 1px 4px rgba(0,0,0,0.07)", overflow:"auto" }}>
            <table style={{ width:"100%", borderCollapse:"collapse", minWidth:"400px" }}>
              {tableHead(["Φ","長さ","本数","状態","操作"],"#0891b2","#ecfeff","#a5f3fc")}
              <tbody>
                {nhRows.length===0 ? <tr><td colSpan={5} style={{ textAlign:"center", padding:"40px", color:"#94a3b8" }}>該当なし</td></tr>
                  : nhRows.map(([id,n],i)=>(
                  <tr key={id} style={{ borderBottom:"1px solid #f1f5f9", background:n.quantity===0?"#fff8f8":i%2===0?"#fff":"#f9fafb" }}>
                    <td style={{ padding:"10px 12px", fontWeight:800, color:"#1e293b" }}>Φ{n.phi}</td>
                    <td style={{ padding:"10px 12px", fontWeight:700, color:"#0891b2" }}>{n.length}m</td>
                    <td style={{ padding:"10px 12px", fontWeight:800, color:n.quantity===0?ZERO_COLOR:"#1e293b", fontSize:"15px" }}>{n.quantity} <span style={{ fontSize:"11px", color:"#94a3b8", fontWeight:400 }}>本</span></td>
                    <td style={{ padding:"10px 12px" }}><ZeroBadge qty={n.quantity} /></td>
                    <td style={{ padding:"10px 12px" }}><div style={{ display:"flex", gap:"5px" }}>{adjBtn(()=>setAdjustTarget({type:"newhope",id,item:n,label:nhLabel(n),unit:"本"}))}{delBtn(()=>dbRemove(`newhope/${id}`))}</div></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}

        <div style={{ marginTop:"10px", fontSize:"12px", color:"#94a3b8", textAlign:"right" }}>
          {tab==="tee"?`${teeRows.length} 件`:tab==="reducer"?`${redRows.length} 件`:tab==="newhope"?`${nhRows.length} 件`:`Φ${filteredPhis.length}サイズ表示`}
        </div>
      </div>

      {adjustTarget && <AdjustModal title={`入出庫 — ${adjustTarget.label}`} item={adjustTarget.item} unit={adjustTarget.unit} onApply={applyAdjust} onClose={()=>setAdjustTarget(null)} />}
      {addModal==="tee"      && <Modal title="T管を追加"         onClose={()=>setAddModal(null)}><TeeForm      onSave={addTee}     onClose={()=>setAddModal(null)} /></Modal>}
      {addModal==="reducer"  && <Modal title="レジューサーを追加" onClose={()=>setAddModal(null)}><ReducerForm  onSave={addReducer} onClose={()=>setAddModal(null)} /></Modal>}
      {addModal==="newhope"  && <Modal title="ニューホープを追加" onClose={()=>setAddModal(null)}><NewhopeForm  onSave={addNewhope} onClose={()=>setAddModal(null)} /></Modal>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
